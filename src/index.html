<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recall</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/themes.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body class="dark">
  <div id="app">
    <div id="toast-container" class="toast-container"></div>
    <div id="header-bar">
      <span style="font-weight: 600; font-size: 13px; color: var(--text-secondary);">Recall</span>
      <button class="pin-btn" id="pin-window" title="Fixar em primeiro plano">&#128204;</button>
    </div>
    <nav id="tabs">
      <button class="tab active" data-tab="notes">Notas</button>
      <button class="tab" data-tab="reminders">Lembretes</button>
      <button class="tab" data-tab="settings">Config</button>
    </nav>
    <main id="content">
      <div id="view-notes" class="view active"></div>
      <div id="view-reminders" class="view"></div>
      <div id="view-settings" class="view"></div>
    </main>
  </div>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
